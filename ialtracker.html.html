<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAL Grade Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .active-tab { border-bottom: 4px solid #10b981; color: #10b981; }
        select { -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-10">

    <nav class="flex justify-around bg-slate-800 border-b border-slate-700 sticky top-0 z-10 shadow-lg">
        <button onclick="showPage('inputPage')" id="tab-input" class="flex-1 py-4 font-bold active-tab">LOG GRADE</button>
        <button onclick="showPage('analysisPage')" id="tab-analysis" class="flex-1 py-4 font-bold text-slate-400">ANALYSIS</button>
    </nav>

    <div id="inputPage" class="max-w-md mx-auto p-6 space-y-6">
        <div class="bg-slate-800 rounded-3xl p-6 shadow-xl border border-slate-700 space-y-4">
            <h2 class="text-xl font-bold text-emerald-400">Record Practice</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Subject</label>
                    <select id="subject" onchange="updateUnits()" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500">
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="Economics">Economics</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Unit / Paper</label>
                    <select id="paper" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500">
                        </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Paper Year</label>
                    <select id="paperYear" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Session</label>
                    <select id="paperMonth" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500">
                        <option value="Jan">January</option>
                        <option value="June">June</option>
                        <option value="Oct">Oct/Nov</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 pt-2">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Score %</label>
                    <input type="number" id="score" placeholder="85" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Grade</label>
                    <select id="grade" class="w-full bg-slate-700 p-4 rounded-xl border-none outline-none focus:ring-2 ring-emerald-500 text-center font-bold">
                        <option value="A*">A*</option><option value="A">A</option><option value="B">B</option>
                        <option value="C">C</option><option value="D">D</option><option value="U">U</option>
                    </select>
                </div>
            </div>

            <button onclick="saveGrade()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all mt-4">SAVE RESULT</button>
        </div>
    </div>

    <div id="analysisPage" class="max-w-4xl mx-auto p-6 space-y-6 hidden">
        
        <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex items-center justify-between">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest px-2">Filter View</span>
            <select id="filterSubject" onchange="updateAnalysis()" class="bg-slate-700 text-sm p-2 px-4 rounded-lg outline-none ring-1 ring-slate-600">
                <option value="All">All Subjects</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Economics">Economics</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 text-center shadow-lg">
                <div class="text-slate-400 text-[10px] uppercase font-bold">Average Score</div>
                <div id="avgScore" class="text-3xl font-black text-emerald-400">0%</div>
            </div>
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 text-center shadow-lg">
                <div class="text-slate-400 text-[10px] uppercase font-bold">Papers Recorded</div>
                <div id="totalPapers" class="text-3xl font-black text-blue-400">0</div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
            <h3 class="font-bold text-slate-300 mb-4 uppercase text-[10px] tracking-widest">Trend Analysis</h3>
            <div id="graphContainer" class="space-y-4"></div>
        </div>

        <div class="bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-700 text-slate-300 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Info</th>
                            <th class="p-4 text-center">Score</th>
                            <th class="p-4 text-center">Grd</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Init Setup
        const currentYear = new Date().getFullYear();
        const yearSelect = document.getElementById('paperYear');
        for (let i = currentYear; i >= 2016; i--) {
            yearSelect.innerHTML += `<option value="${i}">${i}</option>`;
        }

        function updateUnits() {
            const subject = document.getElementById('subject').value;
            const paperSelect = document.getElementById('paper');
            const mathUnits = ['P1', 'P2', 'P3', 'P4', 'M1', 'S1', 'M2', 'S2', 'D1', 'FP1', 'FP2', 'FP3'];
            const standardUnits = ['Unit 1', 'Unit 2', 'Unit 3', 'Unit 4', 'Unit 5', 'Unit 6'];
            
            const units = (subject === 'Mathematics') ? mathUnits : standardUnits;
            paperSelect.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
        }

        function showPage(pageId) {
            document.getElementById('inputPage').classList.add('hidden');
            document.getElementById('analysisPage').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-emerald-400'));
            const activeTab = pageId === 'inputPage' ? 'tab-input' : 'tab-analysis';
            document.getElementById(activeTab).classList.add('active-tab');

            if(pageId === 'analysisPage') updateAnalysis();
        }

        function saveGrade() {
            const entry = {
                sub: document.getElementById('subject').value,
                pap: document.getElementById('paper').value,
                pYear: document.getElementById('paperYear').value,
                pMonth: document.getElementById('paperMonth').value,
                sco: parseInt(document.getElementById('score').value),
                gra: document.getElementById('grade').value,
                id: Date.now(),
                date: new Date().toLocaleDateString()
            };

            if (isNaN(entry.sco)) return alert("Please enter a score");

            let grades = JSON.parse(localStorage.getItem('ial_grades') || '[]');
            grades.unshift(entry);
            localStorage.setItem('ial_grades', JSON.stringify(grades));

            document.getElementById('score').value = '';
            alert("Success!");
        }

        function updateAnalysis() {
            const filter = document.getElementById('filterSubject').value;
            let grades = JSON.parse(localStorage.getItem('ial_grades') || '[]');
            
            if (filter !== 'All') {
                grades = grades.filter(g => g.sub === filter);
            }

            document.getElementById('totalPapers').innerText = grades.length;
            const avg = grades.length ? (grades.reduce((sum, g) => sum + g.sco, 0) / grades.length).toFixed(1) : 0;
            document.getElementById('avgScore').innerText = avg + "%";

            // Table Body
            document.getElementById('tableBody').innerHTML = grades.map(g => `
                <tr class="hover:bg-slate-700/50">
                    <td class="p-4">
                        <div class="font-bold text-emerald-400">${g.sub} ${g.pap}</div>
                        <div class="text-[10px] text-slate-500 font-bold uppercase">${g.pMonth} ${g.pYear}</div>
                    </td>
                    <td class="p-4 text-center font-mono text-white font-bold">${g.sco}%</td>
                    <td class="p-4 text-center"><span class="bg-slate-900 px-3 py-1 rounded-lg font-black">${g.gra}</span></td>
                    <td class="p-4 text-right"><button onclick="deleteRow(${g.id})" class="text-red-900 font-bold opacity-30">X</button></td>
                </tr>
            `).join('');

            // Graph - If "All", show subjects. If specific subject, show individual units.
            const graphContainer = document.getElementById('graphContainer');
            const categories = filter === 'All' ? [...new Set(grades.map(g => g.sub))] : [...new Set(grades.map(g => g.pap))];
            
            graphContainer.innerHTML = categories.map(cat => {
                const filtered = grades.filter(g => (filter === 'All' ? g.sub : g.pap) === cat);
                const catAvg = (filtered.reduce((sum, g) => sum + g.sco, 0) / filtered.length).toFixed(0);
                return `
                    <div>
                        <div class="flex justify-between text-[11px] mb-1 font-bold"><span>${cat}</span><span>${catAvg}%</span></div>
                        <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full" style="width: ${catAvg}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteRow(id) {
            if(!confirm("Delete?")) return;
            let grades = JSON.parse(localStorage.getItem('ial_grades') || '[]');
            grades = grades.filter(g => g.id !== id);
            localStorage.setItem('ial_grades', JSON.stringify(grades));
            updateAnalysis();
        }

        // Initialize units on first load
        updateUnits();
    </script>
</body>
</html>
